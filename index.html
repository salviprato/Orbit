<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Canchas Greenpoint</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #171d24; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controles-vista { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-vista {
            background-color: #2c3540; color: white; border: 1px solid #44505d;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-vista.activo { background-color: #3b82f6; border-color: #3b82f6; }

        /* Vista Jugador */
        .vista-jugador {
            background-color: #1e252d; width: 100%; max-width: 400px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        
        /* NUEVO: ESTILOS DEL CALENDARIO HORIZONTAL */
        .calendario-strip {
            display: flex; overflow-x: auto; gap: 10px; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #2c3540;
        }
        .calendario-strip::-webkit-scrollbar { height: 6px; }
        .calendario-strip::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        
        .dia-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-width: 65px; padding: 12px 8px; background-color: #242c36; border-radius: 10px;
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .dia-item:hover { background-color: #2c3540; }
        .dia-item.activo { background-color: #3b82f6; border-color: #3b82f6; color: white; transform: scale(1.05); }
        .dia-nombre { font-size: 0.8em; color: #9ca3af; text-transform: uppercase; font-weight: bold;}
        .dia-item.activo .dia-nombre { color: #e5e7eb; }
        .dia-numero { font-size: 1.4em; font-weight: bold; margin-top: 4px; }
        /* -------------------------------------- */

        .sub-header { display: flex; justify-content: space-between; color: #9ca3af; font-size: 0.9em; padding-bottom: 10px; border-bottom: 1px solid #2c3540; margin-bottom: 10px; }
        
        #lista-horarios { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        #lista-horarios::-webkit-scrollbar { width: 6px; }
        #lista-horarios::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }

        .turno-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c3540; cursor: pointer; transition: 0.2s; }
        .turno-item:hover { background-color: #242c36; }
        .punto-verde { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; margin-right: 15px; min-width: 10px; }
        .hora { font-weight: bold; margin-right: 8px; }
        .texto-disponible { color: #d1d5db; font-size: 0.9em; }

        /* Vista Club */
        .vista-club {
            display: none; background-color: #1e252d; width: 100%; max-width: 600px;
            border-radius: 12px; padding: 20px; box-sizing: border-box;
        }
        
        .config-club { background-color: #242c36; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #2c3540; }
        .inputs-horarios { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; margin-top: 10px; }
        .inputs-horarios div { display: flex; flex-direction: column; gap: 5px; font-size: 0.9em; color: #d1d5db; }
        .inputs-horarios input { padding: 8px; border-radius: 5px; border: 1px solid #44505d; background-color: #171d24; color: white; color-scheme: dark; font-family: inherit; max-width: 120px;}
        .btn-guardar { background-color: #10b981; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-guardar:hover { background-color: #059669; }

        .reservas-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 15px;
        }
        
        .tarjeta-reserva {
            background-color: #f6a74b; color: #171d24; padding: 12px; border-radius: 8px; font-size: 0.9em; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 6px solid #d97706; cursor: pointer; transition: transform 0.1s;
        }
        .tarjeta-reserva:hover { transform: scale(1.02); }
        .tarjeta-reserva.asistio { background-color: #3b82f6; color: #ffffff; border-left: 6px solid #1d4ed8; }
        
        .tarjeta-reserva p { margin: 5px 0; }
        .estado-pagado { color: #047857; background: rgba(255,255,255,0.4); padding: 2px 6px; border-radius: 4px; }
        .estado-deuda { color: #b91c1c; }
        .mensaje-vacio { color: #9ca3af; text-align: center; margin-top: 20px; grid-column: 1 / -1; }

        /* Modal de acciones */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1e252d; padding: 25px; border-radius: 12px; width: 90%; max-width: 300px;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid #44505d; text-align: center;
        }
        .btn-modal { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 1em; transition: 0.2s;}
        .btn-asistencia { background-color: #3b82f6; }
        .btn-asistencia:hover { background-color: #2563eb; }
        .btn-pago { background-color: #10b981; }
        .btn-pago:hover { background-color: #059669; }
        .btn-nopago { background-color: #f59e0b; }
        .btn-nopago:hover { background-color: #d97706; }
        .btn-eliminar { background-color: #ef4444; }
        .btn-eliminar:hover { background-color: #dc2626; }
        .btn-cerrar { background-color: #4b5563; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="controles-vista">
        <button id="btn-jugador" class="btn-vista activo" onclick="window.cambiarVista('jugador')">📱 Vista Jugadores</button>
        <button id="btn-club" class="btn-vista" onclick="window.cambiarVista('club')">💻 Vista Club</button>
    </div>

    <div id="pantalla-jugador" class="vista-jugador">
        <h2 style="margin-top: 0; margin-bottom: 20px;">Reserva de canchas</h2>
        
        <div id="calendario-jugador" class="calendario-strip">
            </div>

        <div class="sub-header"><span>Cancha 1</span><span>Greenpoint</span></div>
        <div id="lista-horarios">Cargando horarios...</div>
    </div>

    <div id="pantalla-club" class="vista-club">
        <h2 style="margin-top: 0; text-align: center;">Panel de Control - Reservas</h2>
        
        <div class="config-club">
            <h3 style="margin: 0; font-size: 1.1em;">⚙️ Configuración del Club</h3>
            <div class="inputs-horarios">
                <div><label>Abre:</label><input type="time" id="input-apertura" value="08:00"></div>
                <div><label>Cierra:</label><input type="time" id="input-cierre" value="23:30"></div>
                <div><label>Precio ($):</label><input type="number" id="input-precio" value="15000" step="500"></div>
                <button class="btn-guardar" onclick="window.guardarConfiguracion()">Guardar</button>
            </div>
        </div>

        <div id="calendario-club" class="calendario-strip">
            </div>

        <div class="reservas-grid" id="lista-reservas-club">
            </div>
    </div>

    <div id="modal-acciones" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 10px;">Gestionar Turno</h3>
            <button class="btn-modal btn-asistencia" onclick="window.accionAsistencia()">✔️ Confirmar Asistencia</button>
            <button class="btn-modal btn-pago" onclick="window.accionPago()">✅ Marcar como Pagado</button>
            <button class="btn-modal btn-nopago" onclick="window.accionNoPago()">❌ Marcar como No Pagado</button>
            <button class="btn-modal btn-eliminar" onclick="window.accionEliminar()">🗑️ Eliminar Reserva</button>
            <button class="btn-modal btn-cerrar" onclick="window.cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMRLDlarJiomWY4IX5c6CR3RFWHqmMu30",
            authDomain: "greenpoint-80ba8.firebaseapp.com",
            projectId: "greenpoint-80ba8",
            storageBucket: "greenpoint-80ba8.firebasestorage.app",
            messagingSenderId: "553295919513",
            appId: "1:553295919513:web:79d5da1a535e3835e0bb08"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DEL CALENDARIO VISUAL ---
        let fechasValidas = [];
        let fechaActual = new Date();
        
        for (let i = 0; i <= 7; i++) {
            let f = new Date(fechaActual);
            f.setDate(f.getDate() + i);
            let anio = f.getFullYear();
            let mes = (f.getMonth() + 1).toString().padStart(2, '0');
            let dia = f.getDate().toString().padStart(2, '0');
            fechasValidas.push(`${anio}-${mes}-${dia}`); 
        }
        
        let fechaSeleccionada = fechasValidas[0]; // Arrancamos en "Hoy"

        // Esta función dibuja las cajitas de los días
        function renderizarCalendarios() {
            const calJugador = document.getElementById('calendario-jugador');
            const calClub = document.getElementById('calendario-club');
            calJugador.innerHTML = '';
            calClub.innerHTML = '';

            const diasCortos = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

            fechasValidas.forEach((fechaISO, index) => {
                const partes = fechaISO.split('-');
                const f = new Date(partes[0], partes[1] - 1, partes[2]);
                
                // Si es el primer día (index 0), ponemos "HOY" en lugar del nombre del día
                const nombreDia = index === 0 ? 'HOY' : diasCortos[f.getDay()];
                const numeroDia = f.getDate().toString().padStart(2, '0');
                
                const esActivo = fechaISO === fechaSeleccionada ? 'activo' : '';

                const htmlDia = `
                    <div class="dia-item ${esActivo}" onclick="window.seleccionarFecha('${fechaISO}')">
                        <span class="dia-nombre">${nombreDia}</span>
                        <span class="dia-numero">${numeroDia}</span>
                    </div>
                `;

                calJugador.innerHTML += htmlDia;
                calClub.innerHTML += htmlDia;
            });
        }

        window.seleccionarFecha = function(fechaISO) {
            fechaSeleccionada = fechaISO;
            renderizarCalendarios(); // Redibuja para pintar de azul el elegido
            renderizarPantallas();   // Actualiza los turnos
        }
        // ------------------------------------

        const horariosBase = [];
        for (let h = 0; h <= 23; h++) { 
            let horaStr = h.toString().padStart(2, '0');
            horariosBase.push(`${horaStr}:00`);
            horariosBase.push(`${horaStr}:30`);
        }
        horariosBase.reverse(); 

        let horaApertura = "08:00"; 
        let horaCierre = "23:30";   
        let precioGlobal = "15000"; 
        let reservasGlobales = [];
        let reservaSeleccionadaId = null; 

        window.aMinutos = function(horaStr) { let [h, m] = horaStr.split(':').map(Number); return (h * 60) + m; }
        window.sumarMinutos = function(horaStr, minutosAñadir) {
            let [h, m] = horaStr.split(':').map(Number); let total = (h * 60) + m + minutosAñadir;
            let nuevaH = Math.floor(total / 60); let nuevoM = total % 60;
            if (nuevaH >= 24) nuevaH -= 24; return `${nuevaH.toString().padStart(2, '0')}:${nuevoM.toString().padStart(2, '0')}`;
        }

        window.cambiarVista = function(vista) {
            document.getElementById('pantalla-jugador').style.display = vista === 'jugador' ? 'block' : 'none';
            document.getElementById('pantalla-club').style.display = vista === 'club' ? 'block' : 'none';
            document.getElementById('btn-jugador').classList.toggle('activo', vista === 'jugador');
            document.getElementById('btn-club').classList.toggle('activo', vista === 'club');
        }

        window.guardarConfiguracion = async function() {
            const apertura = document.getElementById('input-apertura').value;
            const cierre = document.getElementById('input-cierre').value;
            const precio = document.getElementById('input-precio').value;
            if(apertura && cierre && precio) {
                try { await setDoc(doc(db, "configuracion", "club"), { horaApertura: apertura, horaCierre: cierre, precioTurno: precio }); alert("¡Guardado!"); } 
                catch (error) { alert("Error al guardar."); }
            }
        }

        window.reservarCancha = async function(hora) {
            // Formatear para el mensaje de alerta
            const partes = fechaSeleccionada.split('-');
            const f = new Date(partes[0], partes[1] - 1, partes[2]);
            const fechaBonita = `${f.getDate()}/${f.getMonth() + 1}`;

            const nombre = prompt(`Vas a reservar el ${fechaBonita} a las ${hora} hs (1.5h).\nIngresa tu Nombre y Apellido:`);
            if (nombre && nombre.trim() !== "") {
                try {
                    await addDoc(collection(db, "reservas"), { 
                        fecha: fechaSeleccionada,
                        hora: hora, 
                        jugador: nombre, 
                        fechaRegistro: new Date(),
                        asistencia: false, 
                        pagado: false      
                    });
                    alert("¡Reserva guardada con éxito!");
                } catch (error) { alert("Hubo un error de conexión."); }
            }
        }

        window.abrirModal = function(id) { reservaSeleccionadaId = id; document.getElementById('modal-acciones').style.display = 'flex'; }
        window.cerrarModal = function() { reservaSeleccionadaId = null; document.getElementById('modal-acciones').style.display = 'none'; }
        window.accionAsistencia = async function() { if(reservaSeleccionadaId) { await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { asistencia: true }); window.cerrarModal(); } }
        window.accionPago = async function() { if(reservaSeleccionadaId) { await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { pagado: true }); window.cerrarModal(); } }
        window.accionNoPago = async function() { if(reservaSeleccionadaId) { await updateDoc(doc(db, "reservas", reservaSeleccionadaId), { pagado: false }); window.cerrarModal(); } }
        window.accionEliminar = async function() { if(reservaSeleccionadaId && confirm("¿Borrar reserva?")) { await deleteDoc(doc(db, "reservas", reservaSeleccionadaId)); window.cerrarModal(); } }

        onSnapshot(doc(db, "configuracion", "club"), (documento) => {
            if (documento.exists()) {
                horaApertura = documento.data().horaApertura || "08:00";
                horaCierre = documento.data().horaCierre || "23:30";
                precioGlobal = documento.data().precioTurno || "15000";
                document.getElementById('input-apertura').value = horaApertura;
                document.getElementById('input-cierre').value = horaCierre;
                document.getElementById('input-precio').value = precioGlobal;
            }
            renderizarPantallas(); 
        });

        onSnapshot(collection(db, "reservas"), (snapshot) => {
            reservasGlobales = [];
            snapshot.forEach((doc) => reservasGlobales.push({ id: doc.id, ...doc.data() }));
            renderizarPantallas(); 
        });

        function renderizarPantallas() {
            const contenedorHorarios = document.getElementById('lista-horarios');
            const contenedorClub = document.getElementById('lista-reservas-club');
            contenedorHorarios.innerHTML = '';
            contenedorClub.innerHTML = '';

            const reservasDelDia = reservasGlobales.filter(r => {
                const fechaReserva = r.fecha || fechasValidas[0]; 
                return fechaReserva === fechaSeleccionada;
            });

            let bloquesOcupados = [];
            reservasDelDia.forEach(r => {
                bloquesOcupados.push(r.hora); 
                bloquesOcupados.push(window.sumarMinutos(r.hora, 30));
                bloquesOcupados.push(window.sumarMinutos(r.hora, 60));
            });

            const horariosFiltrados = horariosBase.filter(h => h >= horaApertura && h <= horaCierre);

            horariosFiltrados.forEach(hora => {
                let bloque1 = hora;
                let bloque2 = window.sumarMinutos(hora, 30);
                let bloque3 = window.sumarMinutos(hora, 60);
                let horaFinStr = window.sumarMinutos(hora, 90);

                let estaLibre = !bloquesOcupados.includes(bloque1) && 
                                !bloquesOcupados.includes(bloque2) && 
                                !bloquesOcupados.includes(bloque3);

                let minInicio = window.aMinutos(hora);
                let minFin = minInicio + 90;
                let minCierre = window.aMinutos(horaCierre);
                if (minCierre === 0) minCierre = 1440; 

                if (estaLibre && minFin <= minCierre) {
                    const div = document.createElement('div');
                    div.className = 'turno-item';
                    div.onclick = () => window.reservarCancha(hora);
                    div.innerHTML = `<span class="punto-verde"></span><span class="hora">${hora} hs | </span><span class="texto-disponible">Turno de 1.5 hs (hasta ${horaFinStr} hs)</span>`;
                    contenedorHorarios.appendChild(div);
                }
            });

            if (reservasDelDia.length === 0) {
                contenedorClub.innerHTML = '<div class="mensaje-vacio">No hay reservas para este día.</div>';
            } else {
                const reservasOrdenadas = [...reservasDelDia].sort((a, b) => b.hora.localeCompare(a.hora)); 
                reservasOrdenadas.forEach(reserva => {
                    const horaFin = window.sumarMinutos(reserva.hora, 90);
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-reserva';
                    
                    if (reserva.asistencia) tarjeta.classList.add('asistio');

                    let textoSaldo = reserva.pagado 
                        ? `<span class="estado-pagado">✅ Pagado</span>` 
                        : `<span class="estado-deuda">Pendiente ($${precioGlobal})</span>`;

                    tarjeta.onclick = () => window.abrirModal(reserva.id);

                    tarjeta.innerHTML = `
                        <p style="font-size: 1.1em; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; margin-top: 0;">⏱️ ${reserva.hora} a ${horaFin} hs</p>
                        <p>👤 ${reserva.jugador}</p>
                        <p>📌 Cancha 1</p>
                        <p>Precio: $${precioGlobal}</p>
                        <p>Saldo: ${textoSaldo}</p>
                    `;
                    contenedorClub.appendChild(tarjeta);
                });
            }
        }

        // Arrancamos todo
        renderizarCalendarios();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Canchas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #171d24; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .vista-jugador { background-color: #1e252d; width: 100%; max-width: 400px; border-radius: 12px; padding: 20px; box-sizing: border-box; margin-top: 20px; }
        .calendario-strip { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #2c3540; }
        .calendario-strip::-webkit-scrollbar { height: 6px; } .calendario-strip::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        .dia-item { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 65px; padding: 12px 8px; background-color: #242c36; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .dia-item.activo { background-color: #3b82f6; color: white; transform: scale(1.05); }
        .dia-nombre { font-size: 0.8em; color: #9ca3af; text-transform: uppercase; font-weight: bold;}
        .dia-item.activo .dia-nombre { color: #e5e7eb; }
        .dia-numero { font-size: 1.4em; font-weight: bold; margin-top: 4px; }
        .sub-header { display: flex; justify-content: space-between; color: #9ca3af; font-size: 0.9em; padding-bottom: 10px; border-bottom: 1px solid #2c3540; margin-bottom: 10px; font-weight: bold;}
        #lista-horarios { max-height: 500px; overflow-y: auto; padding-right: 5px; } #lista-horarios::-webkit-scrollbar { width: 6px; } #lista-horarios::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        .turno-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c3540; cursor: pointer; transition: 0.2s; }
        .turno-item:hover { background-color: #242c36; }
        .punto-verde { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; margin-right: 15px; min-width: 10px; }
        .hora { font-weight: bold; margin-right: 8px; } .texto-disponible { color: #d1d5db; font-size: 0.9em; } .texto-canchas-disp { font-size: 0.8em; color: #10b981; margin-left: auto; font-weight: bold;}
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e252d; padding: 25px; border-radius: 12px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #44505d; text-align: center; }
        .input-form { padding: 10px; border-radius: 6px; border: 1px solid #44505d; background-color: #171d24; color: white; font-family: inherit; width: 100%; box-sizing: border-box; }
        .btn-modal { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; width: 100%; }
        .btn-guardar { background-color: #10b981; } .btn-cerrar { background-color: #4b5563; }
    </style>
</head>
<body>

    <div class="vista-jugador">
        <h2 id="titulo-club" style="margin-top: 0; margin-bottom: 20px; text-transform: capitalize;">Cargando...</h2>
        <div id="calendario-jugador" class="calendario-strip"></div>
        <div class="sub-header"><span>Horarios Disponibles</span><span id="sub-titulo-club" style="text-transform: capitalize;"></span></div>
        <div id="lista-horarios">Cargando horarios...</div>
    </div>

    <div id="modal-reserva-jugador" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 5px;">Confirmar Reserva</h3>
            <p style="margin: 0; color: #9ca3af; margin-bottom: 15px;">Fecha: <strong id="reserva-fecha-display" style="color:white;"></strong><br>Horario: <strong id="reserva-hora-display" style="color:white;"></strong></p>
            <div style="text-align: left; display: flex; flex-direction: column; gap: 15px;">
                <div><label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">1. Elige tu cancha:</label><select id="select-cancha-modal" class="input-form" style="margin-top: 5px;"></select></div>
                <div><label style="font-size: 0.9em; color: #d1d5db; font-weight: bold;">2. Nombre y Apellido:</label><input type="text" id="input-nombre-jugador" class="input-form" placeholder="Ej: Franco Aramayo" style="margin-top: 5px;"></div>
            </div>
            <button class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.confirmarReservaJugador()">Confirmar Reserva</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalReservaJugador()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- NUEVO: DETECCIÓN DEL CLUB POR URL ---
        const urlParams = new URLSearchParams(window.location.search);
        // Si entran sin poner un club, por defecto los manda a "greenpoint"
        const clubID = urlParams.get('club') || 'greenpoint'; 
        
        document.getElementById('titulo-club').innerText = `Reservas ${clubID}`;
        document.getElementById('sub-titulo-club').innerText = clubID;
        document.title = `Reservas - ${clubID}`;
        // ------------------------------------------

        const firebaseConfig = {
            apiKey: "AIzaSyAMRLDlarJiomWY4IX5c6CR3RFWHqmMu30", authDomain: "greenpoint-80ba8.firebaseapp.com",
            projectId: "greenpoint-80ba8", storageBucket: "greenpoint-80ba8.firebasestorage.app", messagingSenderId: "553295919513", appId: "1:553295919513:web:79d5da1a535e3835e0bb08"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let fechasValidas = [], fechaSeleccionada = "";
        let primerTurno = "08:00", ultimoTurno = "21:30", cantidadCanchasGlobal = 1, duracionGlobal = 90, reservasGlobales = [], reservaEnProcesoHora = null;

        window.aMinutos = (hStr) => { let [h, m] = hStr.split(':').map(Number); return (h * 60) + m; }
        window.sumarMinutos = (hStr, mAdd) => { let [h, m] = hStr.split(':').map(Number); let t = (h * 60) + m + mAdd; return `${Math.floor(t / 60).toString().padStart(2,'0')}:${(t % 60).toString().padStart(2,'0')}`; }
        window.getDayOfWeek = (dStr) => new Date(dStr.split('-')[0], dStr.split('-')[1]-1, dStr.split('-')[2]).getDay();

        let fAct = new Date();
        for (let i = 0; i <= 7; i++) {
            let f = new Date(fAct); f.setDate(f.getDate() + i);
            fechasValidas.push(`${f.getFullYear()}-${(f.getMonth()+1).toString().padStart(2,'0')}-${f.getDate().toString().padStart(2,'0')}`);
        }
        fechaSeleccionada = fechasValidas[0]; 

        function renderizarCalendarios() {
            const calJugador = document.getElementById('calendario-jugador'); calJugador.innerHTML = '';
            const diasCortos = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            fechasValidas.forEach((iso, index) => {
                const f = new Date(iso.split('-')[0], iso.split('-')[1]-1, iso.split('-')[2]);
                calJugador.innerHTML += `<div class="dia-item ${iso === fechaSeleccionada ? 'activo' : ''}" onclick="window.seleccionarFecha('${iso}')"><span class="dia-nombre">${index === 0 ? 'HOY' : diasCortos[f.getDay()]}</span><span class="dia-numero">${f.getDate().toString().padStart(2, '0')}</span></div>`;
            });
        }
        window.seleccionarFecha = (iso) => { fechaSeleccionada = iso; renderizarCalendarios(); renderizarPantallas(); }

        const horariosBase = []; for (let h = 0; h <= 23; h++) { let hS = h.toString().padStart(2, '0'); horariosBase.push(`${hS}:00`, `${hS}:30`); } horariosBase.reverse(); 

        // NUEVO: La ruta a la base de datos ahora usa el clubID
        onSnapshot(doc(db, "clubes", clubID, "configuracion", "ajustes"), (d) => {
            if (d.exists()) { primerTurno = d.data().primerTurno || "08:00"; ultimoTurno = d.data().ultimoTurno || "21:30"; cantidadCanchasGlobal = parseInt(d.data().canchas) || 1; duracionGlobal = parseInt(d.data().duracionTurno) || 90; }
            renderizarPantallas(); 
        });

        // NUEVO: La ruta a las reservas ahora usa el clubID
        onSnapshot(collection(db, "clubes", clubID, "reservas"), (snap) => {
            reservasGlobales = []; snap.forEach((doc) => reservasGlobales.push({ id: doc.id, ...doc.data() })); renderizarPantallas(); 
        });

        window.renderizarPantallas = function() {
            const contenedor = document.getElementById('lista-horarios'); contenedor.innerHTML = '';
            const dowNum = window.getDayOfWeek(fechaSeleccionada);
            const filtrados = horariosBase.filter(h => h >= primerTurno && h <= ultimoTurno);
            const numB = duracionGlobal / 30;

            filtrados.forEach(hora => {
                let bn = []; for(let b=0; b < numB; b++) bn.push(window.sumarMinutos(hora, b * 30));
                let cOcupadas = new Set();
                
                reservasGlobales.forEach(r => {
                    if (((r.fecha || fechasValidas[0]) === fechaSeleccionada) || (r.fijo && window.getDayOfWeek(r.fecha) === dowNum)) {
                        let bRes = []; for(let b=0; b < (r.duracion||90)/30; b++) bRes.push(window.sumarMinutos(r.hora, b * 30));
                        if(bn.some(b => bRes.includes(b))) cOcupadas.add(parseInt(r.cancha || "1"));
                    }
                });

                let libres = cantidadCanchasGlobal - cOcupadas.size;
                let minInicio = window.aMinutos(hora);
                let minCierre = window.aMinutos(ultimoTurno);
                if (minCierre === 0) minCierre = 1440;

                if (libres > 0 && minInicio <= minCierre) {
                    let div = document.createElement('div'); div.className = 'turno-item'; div.onclick = () => window.abrirModalReserva(hora);
                    let hsTexto = duracionGlobal % 60 === 0 ? (duracionGlobal/60) : (duracionGlobal/60).toFixed(1);
                    div.innerHTML = `<span class="punto-verde"></span><span class="hora">${hora} hs | </span><span class="texto-disponible">Turno ${hsTexto} hs</span><span class="texto-canchas-disp">${libres === 1 ? "1 libre" : libres + " libres"}</span>`;
                    contenedor.appendChild(div);
                }
            });
        }

        window.abrirModalReserva = (hora) => {
            if (window.aMinutos(hora) > window.aMinutos(ultimoTurno)) { alert("Horario fuera de límite."); return; }
            reservaEnProcesoHora = hora;
            document.getElementById('reserva-fecha-display').innerText = fechaSeleccionada; 
            let hsTexto = duracionGlobal % 60 === 0 ? (duracionGlobal/60) : (duracionGlobal/60).toFixed(1);
            document.getElementById('reserva-hora-display').innerText = `${hora} hs (${hsTexto}h)`;
            
            let bn = []; for(let b=0; b < duracionGlobal/30; b++) bn.push(window.sumarMinutos(hora, b * 30));
            let cOcupadas = new Set();
            reservasGlobales.forEach(r => {
                if (((r.fecha || fechasValidas[0]) === fechaSeleccionada) || (r.fijo && window.getDayOfWeek(r.fecha) === window.getDayOfWeek(fechaSeleccionada))) {
                    let bRes = []; for(let b=0; b < (r.duracion||90)/30; b++) bRes.push(window.sumarMinutos(r.hora, b * 30));
                    if(bn.some(b => bRes.includes(b))) cOcupadas.add(parseInt(r.cancha || "1"));
                }
            });

            const sel = document.getElementById('select-cancha-modal'); sel.innerHTML = '';
            for(let c = 1; c <= cantidadCanchasGlobal; c++) if(!cOcupadas.has(c)) sel.innerHTML += `<option value="${c}" style="color: black;">Cancha ${c}</option>`;
            document.getElementById('input-nombre-jugador').value = ""; document.getElementById('modal-reserva-jugador').style.display = 'flex';
        }
        window.cerrarModalReservaJugador = () => document.getElementById('modal-reserva-jugador').style.display = 'none';
        window.confirmarReservaJugador = async () => {
            const nom = document.getElementById('input-nombre-jugador').value; const can = document.getElementById('select-cancha-modal').value;
            if (!nom) { alert("Ingresa tu Nombre y Apellido."); return; }
            try { 
                // NUEVO: Guarda la reserva en la carpeta del club específico
                await addDoc(collection(db, "clubes", clubID, "reservas"), { fecha: fechaSeleccionada, hora: reservaEnProcesoHora, cancha: can, jugador: nom, duracion: duracionGlobal, fechaRegistro: new Date(), asistencia: false, pagado: false, fijo: false }); 
                alert("¡Reserva exitosa!"); cerrarModalReservaJugador(); 
            } catch (e) { alert("Error de conexión."); }
        }
        renderizarCalendarios();
    </script>
</body>
</html>

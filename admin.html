<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #171d24; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        #login-screen { background-color: #1e252d; padding: 40px; border-radius: 12px; border: 1px solid #2c3540; text-align: center; width: 100%; max-width: 350px; margin-top: 50px; }
        .input-login { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #44505d; background-color: #171d24; color: white; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background-color: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-login:hover { background-color: #2563eb; }

        #admin-screen { display: none; width: 100%; max-width: 900px; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background-color: #1e252d; padding: 15px 20px; border-radius: 12px; }
        .btn-logout { background-color: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .calendario-strip { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 12px; margin-bottom: 15px; border-bottom: 1px solid #2c3540; }
        .calendario-strip::-webkit-scrollbar { height: 6px; }
        .calendario-strip::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        .dia-item { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 65px; padding: 12px 8px; background-color: #242c36; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .dia-item:hover { background-color: #2c3540; }
        .dia-item.activo { background-color: #3b82f6; border-color: #3b82f6; color: white; transform: scale(1.05); }
        .dia-nombre { font-size: 0.8em; color: #9ca3af; text-transform: uppercase; font-weight: bold;}
        .dia-numero { font-size: 1.4em; font-weight: bold; margin-top: 4px; }

        .contenedor-grilla { display: flex; overflow-x: auto; background: #1e252d; border: 1px solid #2c3540; border-radius: 8px; margin-top: 15px; user-select: none; }
        .contenedor-grilla::-webkit-scrollbar { height: 8px; }
        .contenedor-grilla::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
        .tarjeta-reserva-grilla { background-color: #f6a74b; color: #171d24; border-left: 5px solid #d97706; transition: 0.1s; }
        .tarjeta-reserva-grilla:hover { filter: brightness(1.1); }
        .tarjeta-reserva-grilla.asistio { background-color: #3b82f6; color: #ffffff; border-left: 5px solid #1d4ed8; }
        .celda-vacia-hover { transition: background-color 0.1s; }
        .celda-vacia-hover:hover { background-color: rgba(59, 130, 246, 0.15); cursor: pointer;}
        .mensaje-vacio { color: #9ca3af; text-align: center; margin-top: 20px; width: 100%; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e252d; padding: 25px; border-radius: 12px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #44505d; text-align: center; }
        .input-form { padding: 10px; border-radius: 6px; border: 1px solid #44505d; background-color: #171d24; color: white; color-scheme: dark; font-family: inherit; width: 100%; box-sizing: border-box; }
        .btn-modal { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 1em; transition: 0.2s; width: 100%; box-sizing: border-box;}
        
        .btn-guardar { background-color: #10b981; } .btn-guardar:hover { background-color: #059669; }
        .btn-asistencia { background-color: #3b82f6; } .btn-asistencia:hover { background-color: #2563eb; }
        .btn-pago { background-color: #10b981; flex: 1;} .btn-pago:hover { background-color: #059669; }
        .btn-nopago { background-color: #f59e0b; flex: 1;} .btn-nopago:hover { background-color: #d97706; }
        .btn-eliminar { background-color: #ef4444; } .btn-eliminar:hover { background-color: #dc2626; }
        .btn-cerrar { background-color: #4b5563; } .btn-cerrar:hover { background-color: #374151; }
        
        .scroll-interno::-webkit-scrollbar { width: 6px; } .scroll-interno::-webkit-scrollbar-thumb { background: #44505d; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="margin-top: 0;" id="titulo-login">Acceso Restringido</h2>
        <p style="color: #9ca3af; font-size: 0.9em; margin-bottom: 20px;">Ingresa tus credenciales para administrar.</p>
        <input type="email" id="email-input" class="input-login" placeholder="Correo electrónico">
        <input type="password" id="password-input" class="input-login" placeholder="Contraseña">
        <button class="btn-login" onclick="window.iniciarSesion()">Iniciar Sesión</button>
        <p id="login-error" style="color: #ef4444; font-size: 0.85em; display: none; margin-top: 15px;">Usuario o contraseña incorrectos.</p>
    </div>

    <div id="admin-screen">
        <div class="header-admin">
            <h2 style="margin: 0; text-transform: capitalize;" id="nombre-panel-club">Panel - Cargando...</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button onclick="window.abrirModalMetricas()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #9ca3af;" title="Métricas">📊</button>
                <button onclick="window.abrirModalConfig()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #9ca3af;" title="Configuración">⚙️</button>
                <button class="btn-logout" onclick="window.cerrarSesion()">Salir</button>
            </div>
        </div>

        <div id="calendario-club" class="calendario-strip"></div>
        <div id="lista-reservas-club"></div>
    </div>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 15px; border-bottom: 1px solid #44505d; padding-bottom: 10px;">⚙️ Configuración del Club</h3>
            <div style="text-align: left; display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Abre / Primer Turno:</label><input type="time" id="input-primer-turno" class="input-form" style="margin-top: 4px;"></div>
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Cierra / Último Turno:</label><input type="time" id="input-ultimo-turno" class="input-form" style="margin-top: 4px;"></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">Precio ($):</label><input type="number" id="input-precio" step="500" class="input-form" style="margin-top: 4px;"></div>
                    <div style="flex: 1;"><label style="font-size: 0.9em; color: #d1d5db;">N° Canchas:</label><input type="number" id="input-canchas" min="1" max="20" class="input-form" style="margin-top: 4px;"></div>
                </div>
                <div>
                    <label style="font-size: 0.9em; color: #d1d5db;">Duración Standard:</label>
                    <select id="input-duracion" class="input-form" style="margin-top: 4px;">
                        <option value="60">60 Minutos (1h)</option>
                        <option value="90">90 Minutos (1.5h)</option>
                        <option value="120">120 Minutos (2h)</option>
                    </select>
                </div>
            </div>
            <button class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.guardarConfiguracion()">Guardar Todo</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalConfig()">Cancelar</button>
        </div>
    </div>

    <div id="modal-metricas" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 15px; border-bottom: 1px solid #44505d; padding-bottom: 10px;">📊 Métricas de Reservas</h3>
            <div id="contenido-metricas" class="scroll-interno" style="text-align: left; max-height: 350px; overflow-y: auto;"></div>
            <button class="btn-modal btn-cerrar" style="margin-top: 15px;" onclick="window.cerrarModalMetricas()">Cerrar</button>
        </div>
    </div>

    <div id="modal-acciones" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 10px;">Gestionar Turno</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-modal btn-asistencia" onclick="window.accionAsistencia()">✔️ Confirmar Asistencia</button>
                <button class="btn-modal btn-cerrar" id="btn-toggle-fijo" onclick="window.accionFijarTurno()">📌 Fijar Turno</button>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-modal btn-pago" onclick="window.accionPago()">✅ Pagado</button>
                    <button class="btn-modal btn-nopago" onclick="window.accionNoPago()">❌ Pendiente</button>
                </div>
                <button class="btn-modal btn-eliminar" onclick="window.accionEliminar()">🗑️ Eliminar Reserva</button>
                <button class="btn-modal btn-cerrar" onclick="window.cerrarModalAcciones()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-reserva-admin" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin: 0; margin-bottom: 5px;">Agendar Turno Manual</h3>
            <p style="margin: 0; color: #9ca3af; margin-bottom: 15px;"><strong id="reserva-fecha-display"></strong> | <strong id="reserva-hora-display"></strong></p>
            <div style="text-align: left; display: flex; flex-direction: column; gap: 15px;">
                <div><label style="color: #d1d5db;">1. Cancha:</label><select id="select-cancha-modal" class="input-form"></select></div>
                <div><label style="color: #d1d5db;">2. Jugador:</label><input type="text" id="input-nombre-jugador" class="input-form" placeholder="Ej: Franco Aramayo"></div>
            </div>
            <button class="btn-modal btn-guardar" style="margin-top: 20px;" onclick="window.confirmarReservaAdmin()">Guardar Turno</button>
            <button class="btn-modal btn-cerrar" style="margin-top: 0;" onclick="window.cerrarModalReservaAdmin()">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const clubID = urlParams.get('club') || 'greenpoint'; 
        document.title = `Admin - ${clubID}`;
        document.getElementById('titulo-login').innerText = `Acceso: ${clubID}`;
        document.getElementById('nombre-panel-club').innerText = `Panel - ${clubID}`;

        const firebaseConfig = {
            apiKey: "AIzaSyAMRLDlarJiomWY4IX5c6CR3RFWHqmMu30", authDomain: "greenpoint-80ba8.firebaseapp.com",
            projectId: "greenpoint-80ba8", storageBucket: "greenpoint-80ba8.firebasestorage.app", messagingSenderId: "553295919513", appId: "1:553295919513:web:79d5da1a535e3835e0bb08"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.iniciarSesion = () => {
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('password-input').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => { document.getElementById('login-error').style.display = 'block'; });
        }
        window.cerrarSesion = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // AQUÍ AGREGAS LOS CORREOS Y SUS CLUBES PERMITIDOS
                const permisos = {
                    "admin@greenpoint.com": "greenpoint",
                    "admin@padelpro.com": "padelpro",
                    "salviprato@gmail.com": "superadmin" // Reemplaza con tu correo personal real
                };

                const clubPermitido = permisos[user.email];

                if (clubPermitido === clubID || clubPermitido === "superadmin") {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('admin-screen').style.display = 'block';
                    iniciarSistemaAdmin();
                } else {
                    alert("Tu correo no tiene permisos para administrar este club.");
                    window.cerrarSesion();
                }
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('admin-screen').style.display = 'none';
            }
        });

        let fechasValidas = [], fechaSeleccionada = "";
        let primerTurno = "08:00", ultimoTurno = "21:30", precioGlobal = "15000", cantidadCanchasGlobal = 1, duracionGlobal = 90; 
        let reservasGlobales = [], reservaSeleccionadaId = null, reservaEnProcesoHora = null;

        window.aMinutos = (hStr) => { let [h, m] = hStr.split(':').map(Number); return (h * 60) + m; }
        window.sumarMinutos = (hStr, mAdd) => { let [h, m] = hStr.split(':').map(Number); let t = (h * 60) + m + mAdd; return `${Math.floor(t / 60).toString().padStart(2,'0')}:${(t % 60).toString().padStart(2,'0')}`; }
        window.getDayOfWeek = (dStr) => new Date(dStr.split('-')[0], dStr.split('-')[1]-1, dStr.split('-')[2]).getDay();

        function iniciarSistemaAdmin() {
            let fAct = new Date();
            for (let i = 0; i <= 7; i++) {
                let f = new Date(fAct); f.setDate(f.getDate() + i);
                fechasValidas.push(`${f.getFullYear()}-${(f.getMonth()+1).toString().padStart(2,'0')}-${f.getDate().toString().padStart(2,'0')}`);
            }
            fechaSeleccionada = fechasValidas[0];
            
            onSnapshot(doc(db, "clubes", clubID, "configuracion", "ajustes"), (docSnap) => {
                if (docSnap.exists()) {
                    let d = docSnap.data();
                    primerTurno = d.primerTurno || "08:00"; ultimoTurno = d.ultimoTurno || "21:30"; precioGlobal = d.precioTurno || "15000"; cantidadCanchasGlobal = parseInt(d.canchas) || 1; duracionGlobal = parseInt(d.duracionTurno) || 90; 
                    document.getElementById('input-primer-turno').value = primerTurno; document.getElementById('input-ultimo-turno').value = ultimoTurno; document.getElementById('input-precio').value = precioGlobal; document.getElementById('input-canchas').value = cantidadCanchasGlobal; document.getElementById('input-duracion').value = duracionGlobal;
                }
                renderizarTodo();
            });

            onSnapshot(collection(db, "clubes", clubID, "reservas"), (snap) => {
                reservasGlobales = []; snap.forEach(doc => reservasGlobales.push({ id: doc.id, ...doc.data() })); renderizarTodo();
            });
        }

        window.seleccionarFecha = (iso) => { fechaSeleccionada = iso; renderizarTodo(); }
        
        function renderizarTodo() {
            const calClub = document.getElementById('calendario-club'); calClub.innerHTML = '';
            const diasCortos = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            fechasValidas.forEach((iso, idx) => {
                const f = new Date(iso.split('-')[0], iso.split('-')[1]-1, iso.split('-')[2]);
                const activo = iso === fechaSeleccionada ? 'activo' : '';
                calClub.innerHTML += `<div class="dia-item ${activo}" onclick="window.seleccionarFecha('${iso}')"><span class="dia-nombre">${idx===0?'HOY':diasCortos[f.getDay()]}</span><span class="dia-numero">${f.getDate().toString().padStart(2,'0')}</span></div>`;
            });

            const contenedorClub = document.getElementById('lista-reservas-club');
            const dowNum = window.getDayOfWeek(fechaSeleccionada);
            let reservasAMostrar = reservasGlobales.filter(r => (r.fecha || fechasValidas[0]) === fechaSeleccionada || (r.fijo && window.getDayOfWeek(r.fecha) === dowNum));

            let minActual = window.aMinutos(primerTurno), minFin = window.aMinutos(ultimoTurno) + duracionGlobal; 
            if (minFin <= minActual) minFin += 1440; 

            let html = `<div class="contenedor-grilla"><div style="width: 55px; flex-shrink: 0; border-right: 1px solid #2c3540; background: #1e252d;"><div style="height: 40px; border-bottom: 1px solid #2c3540; background: #242c36;"></div>`; 
            for (let m = minActual; m < minFin; m += 30) {
                let txt = (m % 60 === 0) ? `${(Math.floor(m / 60)%24).toString().padStart(2,'0')}:00` : ``;
                html += `<div style="height: 40px; border-bottom: 1px ${m%60===0?'dashed rgba(255,255,255,0.05)':'solid #2c3540'}; text-align: center; color: #9ca3af; font-size: 0.8em; padding-top: 3px; box-sizing: border-box;">${txt}</div>`;
            }
            html += `</div>`;

            for(let c = 1; c <= cantidadCanchasGlobal; c++) {
                html += `<div style="flex: 1; min-width: 140px; border-right: 1px solid #2c3540; position: relative;"><div style="height: 40px; border-bottom: 1px solid #2c3540; text-align: center; line-height: 40px; font-weight: bold; background: #242c36; font-size: 0.9em;">Cancha ${c}</div>`;
                
                let resCancha = reservasAMostrar.filter(r => (r.cancha || "1") == c);
                let bloqueOcupado = new Set();
                resCancha.forEach(res => { for(let b=0; b < (res.duracion||90)/30; b++) bloqueOcupado.add(window.sumarMinutos(res.hora, b*30)); });

                for (let m = minActual; m < minFin; m += 30) {
                    let horaFmt = `${(Math.floor(m/60)%24).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`;
                    let extra = !bloqueOcupado.has(horaFmt) ? `class="celda-vacia-hover" style="cursor:pointer;" onclick="window.abrirModalReservaAdmin('${horaFmt}', '${c}')"` : ``;
                    html += `<div ${extra} style="height: 40px; border-bottom: 1px ${m%60===0?'dashed rgba(255,255,255,0.05)':'solid #2c3540'}; box-sizing: border-box;"></div>`;
                }

                resCancha.forEach(res => {
                    let minRes = window.aMinutos(res.hora); if (minRes < minActual && minFin > 1440) minRes += 1440;
                    let top = ((minRes - minActual) / 30) * 40 + 40; let height = ((res.duracion||90) / 30) * 40; 
                    
                    html += `
                        <div class="tarjeta-reserva-grilla ${res.asistencia?'asistio':''}" onclick="window.abrirModal('${res.id}')" 
                             style="position: absolute; top: ${top}px; left: 4px; right: 4px; height: ${height-6}px; padding: 8px; font-size: 0.85em; overflow: hidden; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: flex; flex-direction: column; z-index: 10;">
                            <span style="font-weight: 900; font-size: 1.1em; color: ${res.asistencia?'white':'#171d24'}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${res.jugador}${res.fijo?' 📌':''}</span>
                            <span style="margin-top: 4px; color: ${res.asistencia?'white':'#171d24'}; opacity: 0.8; font-weight: 700;">${res.hora} hs</span>
                            <span style="margin-top: auto; font-weight: bold; color: ${res.asistencia?'white':'#171d24'};">Pago: ${res.pagado?'✅':'Pend'}</span>
                        </div>`;
                });
                html += `</div>`; 
            }
            contenedorClub.innerHTML = html + `</div>`;
        }

        window.abrirModalConfig = () => document.getElementById('modal-config').style.display = 'flex';
        window.cerrarModalConfig = () => document.getElementById('modal-config').style.display = 'none';
        window.abrirModalMetricas = () => { window.calcularMetricas(); document.getElementById('modal-metricas').style.display = 'flex'; }
        window.cerrarModalMetricas = () => document.getElementById('modal-metricas').style.display = 'none';
        
        window.guardarConfiguracion = async () => {
            const p = document.getElementById('input-primer-turno').value, u = document.getElementById('input-ultimo-turno').value;
            const pr = document.getElementById('input-precio').value, c = document.getElementById('input-canchas').value, d = document.getElementById('input-duracion').value;
            if(p && u && pr && c && d) { await setDoc(doc(db, "clubes", clubID, "configuracion", "ajustes"), { primerTurno: p, ultimoTurno: u, precioTurno: pr, canchas: c, duracionTurno: parseInt(d) }); window.cerrarModalConfig(); }
        }

        window.abrirModal = (id) => { 
            reservaSeleccionadaId = id; const res = reservasGlobales.find(r => r.id === id);
            const btn = document.getElementById('btn-toggle-fijo'); btn.innerHTML = res.fijo ? "📌 Quitar Turno Fijo" : "📌 Fijar Turno"; btn.style.backgroundColor = res.fijo ? "#4b5563" : "#4b5563";
            document.getElementById('modal-acciones').style.display = 'flex'; 
        }
        window.cerrarModalAcciones = () => { reservaSeleccionadaId = null; document.getElementById('modal-acciones').style.display = 'none'; }
        
        window.accionAsistencia = async () => { await updateDoc(doc(db, "clubes", clubID, "reservas", reservaSeleccionadaId), { asistencia: true }); window.cerrarModalAcciones(); }
        window.accionPago = async () => { await updateDoc(doc(db, "clubes", clubID, "reservas", reservaSeleccionadaId), { pagado: true }); window.cerrarModalAcciones(); }
        window.accionNoPago = async () => { await updateDoc(doc(db, "clubes", clubID, "reservas", reservaSeleccionadaId), { pagado: false }); window.cerrarModalAcciones(); }
        window.accionEliminar = async () => { if(confirm("¿Estás seguro de borrar este turno?")) { await deleteDoc(doc(db, "clubes", clubID, "reservas", reservaSeleccionadaId)); window.cerrarModalAcciones(); } }
        window.accionFijarTurno = async () => { const res = reservasGlobales.find(r => r.id === reservaSeleccionadaId); await updateDoc(doc(db, "clubes", clubID, "reservas", reservaSeleccionadaId), { fijo: !res.fijo }); window.cerrarModalAcciones(); }

        window.abrirModalReservaAdmin = (hora, cancha) => {
            if (window.aMinutos(hora) > window.aMinutos(ultimoTurno)) { alert("Horario fuera de límite."); return; }
            reservaEnProcesoHora = hora; document.getElementById('reserva-fecha-display').innerText = fechaSeleccionada; document.getElementById('reserva-hora-display').innerText = `${hora} hs`;
            const sel = document.getElementById('select-cancha-modal'); sel.innerHTML = `<option value="${cancha}">Cancha ${cancha}</option>`;
            document.getElementById('input-nombre-jugador').value = ""; document.getElementById('modal-reserva-admin').style.display = 'flex';
        }
        window.cerrarModalReservaAdmin = () => document.getElementById('modal-reserva-admin').style.display = 'none';
        
        window.confirmarReservaAdmin = async () => {
            const nom = document.getElementById('input-nombre-jugador').value;
            if (nom) { await addDoc(collection(db, "clubes", clubID, "reservas"), { fecha: fechaSeleccionada, hora: reservaEnProcesoHora, cancha: document.getElementById('select-cancha-modal').value, jugador: nom, duracion: duracionGlobal, fechaRegistro: new Date(), asistencia: false, pagado: false, fijo: false }); window.cerrarModalReservaAdmin(); }
        }

        window.calcularMetricas = () => { 
            const metricas = {}; const mesesNombres = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            reservasGlobales.forEach(r => {
                if(!r.fecha) return; const partes = r.fecha.split('-'); const anio = partes[0]; const mesNum = parseInt(partes[1], 10); const dia = parseInt(partes[2], 10);
                const mesTexto = `${mesesNombres[mesNum - 1]} ${anio}`; const semanaTexto = `Semana ${Math.ceil(dia / 7)}`;
                if(!metricas[mesTexto]) { metricas[mesTexto] = { totalFijos: 0, totalCasuales: 0, semanas: {} }; }
                if(!metricas[mesTexto].semanas[semanaTexto]) { metricas[mesTexto].semanas[semanaTexto] = { fijos: 0, casuales: 0 }; }
                if(r.fijo) { metricas[mesTexto].totalFijos++; metricas[mesTexto].semanas[semanaTexto].fijos++; } else { metricas[mesTexto].totalCasuales++; metricas[mesTexto].semanas[semanaTexto].casuales++; }
            });
            const contenedor = document.getElementById('contenido-metricas'); let html = "";
            const mesesKeys = Object.keys(metricas);
            if(mesesKeys.length === 0) { contenedor.innerHTML = "<p style='color:#9ca3af; text-align:center;'>Aún no hay reservas.</p>"; return; }
            mesesKeys.sort().reverse().forEach(mes => {
                html += `<div style="background:#242c36; padding:15px; border-radius:8px; margin-bottom:15px; border: 1px solid #2c3540;"><h4 style="margin:0 0 10px 0; color:#3b82f6; border-bottom:1px solid #44505d; padding-bottom:8px;">📅 ${mes}</h4><div style="display: flex; gap: 10px; margin-bottom: 15px;"><div style="flex: 1; background: #171d24; padding: 10px; border-radius: 6px; text-align: center;"><div style="font-size: 1.5em; font-weight: bold; color: #10b981;">${metricas[mes].totalCasuales}</div><div style="font-size: 0.8em; color: #9ca3af;">Casuales</div></div><div style="flex: 1; background: #171d24; padding: 10px; border-radius: 6px; text-align: center;"><div style="font-size: 1.5em; font-weight: bold; color: #f59e0b;">${metricas[mes].totalFijos}</div><div style="font-size: 0.8em; color: #9ca3af;">Fijos 📌</div></div></div><p style="font-size: 0.85em; color: #d1d5db; margin: 0 0 8px 0; font-weight: bold;">Desglose Semanal:</p>`;
                const semanasKeys = Object.keys(metricas[mes].semanas).sort();
                semanasKeys.forEach(sem => { let datos = metricas[mes].semanas[sem]; html += `<div style="display:flex; justify-content:space-between; font-size:0.85em; color:#9ca3af; margin-bottom:6px; padding-left:5px; border-left: 2px solid #44505d;"><span style="padding-left: 8px;">${sem}</span><span><strong style="color: #10b981;">${datos.casuales}</strong> Cas. / <strong style="color: #f59e0b;">${datos.fijos}</strong> Fij.</span></div>`; });
                html += `</div>`;
            });
            contenedor.innerHTML = html;
        }
    </script>
</body>
</html>
